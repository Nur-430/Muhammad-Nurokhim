<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Galeri — Muhammad Nurokhim</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --card2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #2563eb;
      --red: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --radius: 18px;
      --maxw: 1200px;
    }

    * { box-sizing: border-box; }

    /* ── Bug Fix #2: body hidden default, tampil hanya setelah auth selesai ── */
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent 25%),
        radial-gradient(circle at bottom left, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(180deg, #0b1220, #0f172a);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOADING OVERLAY (Bug Fix #2) ── */
    #authOverlay {
      position: fixed;
      inset: 0;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 9999;
    }

    #authOverlay.hidden { display: none; }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-text { color: var(--muted); font-size: 0.95rem; }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: rgba(15, 23, 42, 0.82);
      border-bottom: 1px solid rgba(59, 130, 246, 0.12);
    }

    .nav-wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 800;
      color: #93c5fd;
      letter-spacing: 0.3px;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 7px 13px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #bfdbfe;
      background: rgba(59,130,246,0.12);
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 4px;
    }

    .btn-logout {
      text-decoration: none;
      color: #fca5a5;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 7px 13px;
      border-radius: 10px;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-logout:hover {
      color: #fff;
      background: rgba(239,68,68,0.15);
    }

    /* ── LAYOUT ── */
    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    h1 { text-align: center; margin: 0 0 8px; font-size: clamp(28px, 4vw, 42px); font-weight: 800; }

    .admin-email { text-align: center; color: var(--muted); margin-bottom: 24px; }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 24px;
    }

    .panel h2 { margin-top: 0; font-size: 22px; }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    label { font-weight: 700; color: #dbeafe; }

    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus { border-color: rgba(59,130,246,0.45); }

    textarea { min-height: 100px; resize: vertical; }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: white; }
    .btn-danger { background: rgba(239,68,68,0.18); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; }

    .status { margin-top: 12px; font-size: 14px; color: #cbd5e1; }
    .status.success { color: #86efac; }
    .status.error { color: #fca5a5; }

    .gallery-list {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .item {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .item-body { padding: 14px; }

    .item-title { font-size: 18px; font-weight: 800; margin: 0 0 6px; }

    .item-date { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

    .item-desc { font-size: 14px; color: #cbd5e1; margin-bottom: 12px; white-space: pre-wrap; }

    .item-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .edit-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .edit-box.active { display: block; }

    /* ── SKELETON loading admin gallery ── */
    .skeleton-item {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .skeleton-img-sm {
      width: 100%;
      height: 220px;
      background: linear-gradient(90deg, #1e293b 25%, #263347 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body { padding: 14px; }

    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, #1e293b 25%, #263347 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 10px;
    }

    .skeleton-line.short { width: 50%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── KOMPRESI PREVIEW ── */
    .compress-preview {
      display: none;
      margin-top: 18px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 16px;
      padding: 16px;
    }

    .compress-preview.visible { display: block; }

    .compress-preview h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: #93c5fd;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .preview-box {
      border-radius: 12px;
      overflow: hidden;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .preview-box img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .preview-label {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-label .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 700;
    }

    .tag-original { background: rgba(255,255,255,0.08); color: #94a3b8; }
    .tag-compressed { background: rgba(59,130,246,0.18); color: #60a5fa; }

    .compress-stats {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #94a3b8;
    }

    .compress-stats .saved {
      color: #4ade80;
      font-weight: 700;
      font-size: 14px;
    }

    .compress-quality {
      margin-top: 16px;
    }

    .quality-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .quality-header label {
      font-size: 13px;
      color: #dbeafe;
      font-weight: 700;
    }

    .quality-value {
      font-size: 13px;
      font-weight: 800;
      color: #60a5fa;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    .quality-hints {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* progress bar upload */
    .upload-progress {
      display: none;
      margin-top: 12px;
      height: 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .upload-progress.visible { display: block; }

    .upload-progress-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      width: 0%;
      transition: width 0.4s ease;
    }

    @media (max-width: 640px) {
      .nav-wrap { flex-direction: column; align-items: flex-start; }
      .nav-right { gap: 2px; }
      .preview-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Bug Fix #2: Overlay loading menutupi seluruh halaman saat cek auth -->
  <div id="authOverlay">
    <div class="spinner"></div>
    <div class="auth-text">Memeriksa akses admin...</div>
  </div>

  <nav>
    <div class="nav-wrap">
      <a href="index.html" class="brand">Muhammad Nurokhim</a>
      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="galeri.html">Galeri</a>
          <a href="admin.html" class="active">Admin</a>
        </div>
        <div class="nav-divider"></div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container" id="app" style="visibility:hidden;">
    <h1>Admin Galeri</h1>
    <div class="admin-email" id="adminEmail"></div>

    <section class="panel">
      <h2>Upload Gambar</h2>
      <div class="grid">
        <div class="field">
          <label for="imageFile">Pilih Gambar</label>
          <input type="file" id="imageFile" accept="image/*" />
        </div>

        <div class="field">
          <label for="imageTitle">Judul</label>
          <input type="text" id="imageTitle" placeholder="Masukkan judul gambar" />
        </div>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="imageDesc">Deskripsi (opsional)</label>
        <textarea id="imageDesc" placeholder="Masukkan deskripsi gambar"></textarea>
      </div>

      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="uploadBtn">Upload Gambar</button>
      </div>

      <!-- PREVIEW KOMPRESI -->
      <div class="compress-preview" id="compressPreview">
        <h3>🖼️ Preview Kompresi</h3>

        <div class="compress-quality">
          <div class="quality-header">
            <label for="qualityRange">Kualitas Kompresi</label>
            <span class="quality-value" id="qualityDisplay">82%</span>
          </div>
          <input type="range" id="qualityRange" min="50" max="95" value="82" step="1" />
          <div class="quality-hints">
            <span>Lebih kecil</span>
            <span>Lebih tajam</span>
          </div>
        </div>

        <div class="preview-grid" style="margin-top:14px;">
          <div class="preview-box">
            <img id="previewOriginal" src="" alt="Original" />
            <div class="preview-label">
              <span>Original</span>
              <span class="tag tag-original" id="sizeOriginal">—</span>
            </div>
          </div>
          <div class="preview-box">
            <img id="previewCompressed" src="" alt="Compressed" />
            <div class="preview-label">
              <span>Terkompresi</span>
              <span class="tag tag-compressed" id="sizeCompressed">—</span>
            </div>
          </div>
        </div>

        <div class="compress-stats" id="compressStats"></div>
      </div>

      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="uploadProgressBar"></div>
      </div>

      <div class="status" id="uploadStatus"></div>
    </section>

    <section class="panel">
      <h2>Manajemen Gambar</h2>
      <!-- Skeleton loader admin gallery -->
      <div class="gallery-list" id="adminSkeleton">
        <div class="skeleton-item"><div class="skeleton-img-sm"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-item"><div class="skeleton-img-sm"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        <div class="skeleton-item"><div class="skeleton-img-sm"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      </div>
      <div class="gallery-list" id="adminGallery" style="display:none;"></div>
      <div class="status" id="manageStatus"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";

    // ── Bug Fix #1: Tidak ada ADMIN_EMAIL di client-side ──
    // Validasi admin sepenuhnya lewat tabel `admin_users` di Supabase.

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const authOverlay   = document.getElementById("authOverlay");
    const app           = document.getElementById("app");
    const adminEmail    = document.getElementById("adminEmail");
    const logoutBtn     = document.getElementById("logoutBtn");
    const imageFile     = document.getElementById("imageFile");
    const imageTitle    = document.getElementById("imageTitle");
    const imageDesc     = document.getElementById("imageDesc");
    const uploadBtn     = document.getElementById("uploadBtn");
    const uploadStatus  = document.getElementById("uploadStatus");
    const adminGallery  = document.getElementById("adminGallery");
    const adminSkeleton = document.getElementById("adminSkeleton");
    const manageStatus  = document.getElementById("manageStatus");

    // Kompresi
    const compressPreview    = document.getElementById("compressPreview");
    const qualityRange       = document.getElementById("qualityRange");
    const qualityDisplay     = document.getElementById("qualityDisplay");
    const previewOriginal    = document.getElementById("previewOriginal");
    const previewCompressed  = document.getElementById("previewCompressed");
    const sizeOriginal       = document.getElementById("sizeOriginal");
    const sizeCompressed     = document.getElementById("sizeCompressed");
    const compressStats      = document.getElementById("compressStats");
    const uploadProgress     = document.getElementById("uploadProgress");
    const uploadProgressBar  = document.getElementById("uploadProgressBar");

    let currentUser = null;

    function formatDate(dateString) {
      return new Date(dateString).toLocaleString("id-ID", {
        day: "2-digit", month: "long", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setUploadStatus(msg, type = "") {
      uploadStatus.textContent = msg;
      uploadStatus.className = "status " + type;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function makeFileName(title) {
      const safeBase = (title || "gambar")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return `${Date.now()}-${safeBase}.jpg`;
    }

    // ── KOMPRESI via Canvas API ──
    function compressImage(file, quality) {
      return new Promise((resolve) => {
        const MAX_DIM = 2048; // max lebar/tinggi pixel
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;

            // Scale down jika melebihi MAX_DIM
            if (width > MAX_DIM || height > MAX_DIM) {
              const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
              width  = Math.round(width  * ratio);
              height = Math.round(height * ratio);
            }

            const canvas = document.createElement("canvas");
            canvas.width  = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => resolve(blob),
              "image/jpeg",
              quality / 100
            );
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── Update preview saat file dipilih atau slider digeser ──
    let originalFile = null;

    async function updatePreview() {
      if (!originalFile) return;

      const quality  = parseInt(qualityRange.value);
      const compressed = await compressImage(originalFile, quality);

      const origUrl = URL.createObjectURL(originalFile);
      const compUrl = URL.createObjectURL(compressed);

      previewOriginal.src    = origUrl;
      previewCompressed.src  = compUrl;
      sizeOriginal.textContent   = formatBytes(originalFile.size);
      sizeCompressed.textContent = formatBytes(compressed.size);

      const saved   = originalFile.size - compressed.size;
      const pct     = ((saved / originalFile.size) * 100).toFixed(1);
      const sign    = saved >= 0 ? "-" : "+";
      const absAmt  = formatBytes(Math.abs(saved));

      compressStats.innerHTML = saved > 0
        ? `Hemat <span class="saved">${sign}${absAmt} (${pct}%)</span> dibanding original`
        : `Ukuran bertambah <span style="color:#f87171">+${absAmt}</span> — coba turunkan kualitas`;

      compressPreview.classList.add("visible");
    }

    imageFile.addEventListener("change", () => {
      const file = imageFile.files[0];
      if (!file) return;
      originalFile = file;
      updatePreview();
    });

    qualityRange.addEventListener("input", () => {
      qualityDisplay.textContent = qualityRange.value + "%";
      updatePreview();
    });

    async function uploadImage() {
      const file  = originalFile;
      const title = imageTitle.value.trim();
      const desc  = imageDesc.value.trim();

      if (!file)  { setUploadStatus("Pilih file gambar dulu.", "error"); return; }
      if (!title) { setUploadStatus("Judul wajib diisi.", "error"); return; }

      uploadBtn.disabled = true;
      setUploadStatus("Mengompresi gambar...");

      // Kompresi sebelum upload
      const quality    = parseInt(qualityRange.value);
      const compressed = await compressImage(file, quality);

      // Progress bar animasi
      uploadProgress.classList.add("visible");
      uploadProgressBar.style.width = "30%";
      setUploadStatus("Sedang upload...");

      const fileName = makeFileName(title);

      const { error: storageError } = await client.storage
        .from("uploads")
        .upload(fileName, compressed, {
          cacheControl: "3600",
          upsert: false,
          contentType: "image/jpeg"
        });

      uploadProgressBar.style.width = "70%";

      if (storageError) {
        setUploadStatus("Upload gagal: " + storageError.message, "error");
        uploadBtn.disabled = false;
        uploadProgress.classList.remove("visible");
        uploadProgressBar.style.width = "0%";
        return;
      }

      const { error: dbError } = await client
        .from("gallery_images")
        .insert([{ file_name: fileName, title, description: desc || null }]);

      uploadProgressBar.style.width = "100%";

      if (dbError) {
        setUploadStatus("Gagal simpan data: " + dbError.message, "error");
        uploadBtn.disabled = false;
        setTimeout(() => {
          uploadProgress.classList.remove("visible");
          uploadProgressBar.style.width = "0%";
        }, 600);
        return;
      }

      const origSize = formatBytes(file.size);
      const compSize = formatBytes(compressed.size);
      const savedPct = (((file.size - compressed.size) / file.size) * 100).toFixed(1);

      setUploadStatus(
        `✅ Upload berhasil! ${origSize} → ${compSize} (hemat ${savedPct}%)`,
        "success"
      );

      imageFile.value  = "";
      imageTitle.value = "";
      imageDesc.value  = "";
      originalFile     = null;
      compressPreview.classList.remove("visible");

      setTimeout(() => {
        uploadProgress.classList.remove("visible");
        uploadProgressBar.style.width = "0%";
      }, 800);

      uploadBtn.disabled = false;
      loadAdminGallery();
    }
    async function requireAdmin() {
      const { data, error } = await client.auth.getSession();

      if (error || !data.session) {
        window.location.href = "admin-login.html";
        return false;
      }

      const user = data.session.user;

      // Cek role admin dari tabel database (server-side validation)
      const { data: profile } = await client
        .from("admin_users")
        .select("id")
        .eq("user_id", user.id)
        .maybeSingle();

      if (!profile) {
        await client.auth.signOut();
        window.location.href = "admin-login.html";
        return false;
      }

      currentUser = user;
      adminEmail.textContent = "Login sebagai: " + user.email;

      // Bug Fix #2: Sembunyikan overlay, tampilkan konten setelah auth selesai
      authOverlay.classList.add("hidden");
      app.style.visibility = "visible";
      return true;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "admin-login.html";
    }

    async function loadAdminGallery() {
      adminGallery.style.display = "none";
      adminSkeleton.style.display = "grid";
      manageStatus.textContent = "";

      const { data, error } = await client
        .from("gallery_images")
        .select("*")
        .order("uploaded_at", { ascending: false });

      adminSkeleton.style.display = "none";
      adminGallery.style.display = "grid";
      adminGallery.innerHTML = "";

      if (error) {
        manageStatus.textContent = "Gagal memuat data: " + error.message;
        manageStatus.className = "status error";
        return;
      }

      if (!data || !data.length) {
        manageStatus.textContent = "Belum ada gambar.";
        manageStatus.className = "status";
        return;
      }

      data.forEach(item => {
        const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/uploads/${item.file_name}`;

        const wrapper = document.createElement("div");
        wrapper.className = "item";

        wrapper.innerHTML = `
          <img src="${imageUrl}" alt="${escapeHtml(item.title)}" draggable="false" loading="lazy">
          <div class="item-body">
            <h3 class="item-title">${escapeHtml(item.title)}</h3>
            <div class="item-date">${formatDate(item.uploaded_at)}</div>
            <div class="item-desc">${item.description ? escapeHtml(item.description) : "Tidak ada deskripsi."}</div>

            <div class="item-actions">
              <button class="btn btn-secondary" data-edit="${item.id}">Edit</button>
              <button class="btn btn-danger" data-delete="${item.id}" data-file="${escapeHtml(item.file_name)}">Hapus</button>
            </div>

            <div class="edit-box" id="edit-box-${item.id}">
              <div class="field" style="margin-top: 12px;">
                <label>Judul</label>
                <input type="text" id="edit-title-${item.id}" value="${escapeHtml(item.title)}">
              </div>
              <div class="field" style="margin-top: 12px;">
                <label>Deskripsi</label>
                <textarea id="edit-desc-${item.id}">${item.description ? escapeHtml(item.description) : ""}</textarea>
              </div>
              <div class="item-actions" style="margin-top: 12px;">
                <button class="btn btn-primary" data-save="${item.id}">Simpan</button>
                <button class="btn btn-secondary" data-cancel="${item.id}">Batal</button>
              </div>
            </div>
          </div>
        `;

        adminGallery.appendChild(wrapper);
      });

      bindAdminActions();
    }

    function bindAdminActions() {
      document.querySelectorAll("[data-edit]").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById(`edit-box-${btn.dataset.edit}`).classList.add("active");
        });
      });

      document.querySelectorAll("[data-cancel]").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById(`edit-box-${btn.dataset.cancel}`).classList.remove("active");
        });
      });

      document.querySelectorAll("[data-save]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id    = btn.dataset.save;
          const title = document.getElementById(`edit-title-${id}`).value.trim();
          const desc  = document.getElementById(`edit-desc-${id}`).value.trim();

          if (!title) { alert("Judul tidak boleh kosong."); return; }

          btn.disabled = true;
          const { error } = await client
            .from("gallery_images")
            .update({ title, description: desc || null })
            .eq("id", id);

          btn.disabled = false;
          if (error) { alert("Gagal update: " + error.message); return; }
          alert("Data berhasil diperbarui.");
          loadAdminGallery();
        });
      });

      document.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id       = btn.dataset.delete;
          const fileName = btn.dataset.file;
          if (!confirm("Yakin ingin menghapus gambar ini?")) return;

          btn.disabled = true;

          const { error: storageError } = await client.storage.from("uploads").remove([fileName]);
          if (storageError) {
            alert("Gagal hapus file storage: " + storageError.message);
            btn.disabled = false;
            return;
          }

          const { error: dbError } = await client.from("gallery_images").delete().eq("id", id);
          if (dbError) {
            alert("Gagal hapus data database: " + dbError.message);
            btn.disabled = false;
            return;
          }

          loadAdminGallery();
        });
      });
    }

    logoutBtn.addEventListener("click", logout);
    uploadBtn.addEventListener("click", uploadImage);

    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener("dragstart", (e) => { if (e.target.tagName === "IMG") e.preventDefault(); });

    (async function init() {
      const ok = await requireAdmin();
      if (ok) loadAdminGallery();
    })();
  </script>
</body>
</html>

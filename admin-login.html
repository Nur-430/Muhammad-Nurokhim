<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - Nurokhim</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(17, 24, 39, 0.92);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #2563eb;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 25%),
        radial-gradient(circle at bottom left, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(180deg, #0b1220, #0f172a);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 32px;
      font-weight: 800;
    }

    p.sub {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-weight: 700;
      color: #dbeafe;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: .2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
      color: #cbd5e1;
      min-height: 20px;
    }

    .links {
      margin-top: 18px;
      text-align: center;
    }

    .links a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login Admin</h1>
    <p class="sub">Masuk untuk mengelola galeri</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Masukkan email admin">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Masukkan password">
    </div>

    <button class="btn" id="loginBtn">Login</button>

    <div class="status" id="status"></div>

    <div class="links">
      <a href="index.html">← Kembali ke Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";
    const ADMIN_EMAIL = "nurokhim430@gmail.com"; // contoh: adminkamu@gmail.com

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    async function checkSession() {
      const { data, error } = await client.auth.getSession();
      if (error) return;

      const session = data.session;
      if (!session) return;

      const userEmail = session.user?.email || "";
      if (userEmail.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
        window.location.href = "admin.html";
      } else {
        await client.auth.signOut();
      }
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        statusEl.textContent = "Email dan password wajib diisi.";
        return;
      }

      loginBtn.disabled = true;
      statusEl.textContent = "Sedang login...";

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        statusEl.textContent = "Login gagal: " + error.message;
        loginBtn.disabled = false;
        return;
      }

      const userEmail = data.user?.email || "";

      // Batasi hanya email admin tertentu
      if (userEmail.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
        await client.auth.signOut();
        statusEl.textContent = "Akses ditolak. Bukan akun admin.";
        loginBtn.disabled = false;
        return;
      }

      statusEl.textContent = "Login berhasil. Mengalihkan...";
      window.location.href = "admin.html";
    }

    loginBtn.addEventListener("click", login);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    checkSession();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Galeri</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand" href="index.html">Home</a>
        <a class="navbar-brand" href="galeri.html">Galeri</a>
    </nav>
    <div class="container mt-5">
        <h1 class="text-center">Galeri Gambar</h1>
        <div class="gallery" id="gallery"></div>
    </div>
    <script>
        // Supabase Client
        const { createClient } = supabase;
        const supabaseUrl = 'https://your_supabase_url.supabase.co';
        const supabaseKey = 'your_supabase_key';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function loadGallery() {
            const { data, error } = await supabase.storage.from('uploads').list('');

            if (error) {
                console.error(error);
                return;
            }

            const gallery = document.getElementById('gallery');
            for (const file of data) {
                const imgUrl = `${supabaseUrl}/storage/v1/object/public/uploads/${file.name}`;
                const card = `<div class='card'>\n                    <img src='${imgUrl}' alt='${file.name}' class='card-img-top'>\n                </div>`;
                gallery.innerHTML += card;
            }
        }

        window.onload = loadGallery;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
</body>
</html>

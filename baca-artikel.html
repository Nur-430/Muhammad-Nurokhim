<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel — Muhammad Nurokhim</title>
  <meta name="description" content="Baca artikel dari Muhammad Nurokhim." />
  <style>
    /* ── TEMA VARIABEL ── */
    :root {
      --maxw: 1200px;
      --read-maxw: 720px;
    }

    [data-theme="dark"] {
      --bg: #0b1220;
      --bg2: #0f172a;
      --card: rgba(17,24,39,0.95);
      --text: #e2e8f0;
      --text-soft: #94a3b8;
      --heading: #f8fafc;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.4);
      --blue: #3b82f6;
      --blue2: #2563eb;
      --nav-bg: rgba(15,23,42,0.82);
      --nav-border: rgba(59,130,246,0.12);
      --article-bg: rgba(17,24,39,0.92);
      --caption-bg: rgba(15,23,42,0.7);
      --related-bg: rgba(17,24,39,0.9);
      --toggle-bg: rgba(255,255,255,0.08);
      --toggle-ico: #fbbf24;
      --code-bg: #1e293b;
      --blockquote-border: #3b82f6;
    }

    [data-theme="light"] {
      --bg: #f0f4f8;
      --bg2: #e2e8f0;
      --card: #ffffff;
      --text: #1e293b;
      --text-soft: #64748b;
      --heading: #0f172a;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 8px 24px rgba(0,0,0,0.1);
      --blue: #2563eb;
      --blue2: #1d4ed8;
      --nav-bg: rgba(240,244,248,0.9);
      --nav-border: rgba(37,99,235,0.15);
      --article-bg: #ffffff;
      --caption-bg: #f1f5f9;
      --related-bg: #ffffff;
      --toggle-bg: rgba(0,0,0,0.06);
      --toggle-ico: #7c3aed;
      --code-bg: #f1f5f9;
      --blockquote-border: #2563eb;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
      /* Blokir copy teks */
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }

    a { text-decoration: none; color: inherit; }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(14px);
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      transition: background 0.3s, border-color 0.3s;
    }
    .nav-wrap {
      max-width: var(--maxw); margin: 0 auto;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .brand {
      font-size: 1.05rem; font-weight: 800; color: #3b82f6;
      white-space: nowrap; text-decoration: none;
    }
    [data-theme="light"] .brand { color: #2563eb; }

    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .nav-links { display: flex; gap: 4px; align-items: center; justify-content: center; }
    .nav-links a {
      color: var(--text-soft); font-weight: 600; font-size: 0.9rem;
      padding: 7px 13px; border-radius: 10px; transition: 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--blue); background: rgba(59,130,246,0.1);
    }
    [data-theme="light"] .nav-links a:hover, [data-theme="light"] .nav-links a.active {
      color: var(--blue); background: rgba(37,99,235,0.08);
    }

    /* ── TOGGLE TEMA ── */
    .theme-toggle {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--toggle-bg); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }

    /* ── LOADING ── */
    #loadingState {
      max-width: var(--read-maxw); margin: 60px auto; padding: 0 20px; text-align: center;
      color: var(--text-soft);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 16px;
      border: 3px solid rgba(59,130,246,0.2); border-top-color: #3b82f6;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ARTIKEL CONTAINER ── */
    #articleWrap { display: none; }

    .article-container {
      max-width: var(--read-maxw); margin: 36px auto 0;
      padding: 0 20px;
    }

    /* Breadcrumb / Back */
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text-soft); font-size: 0.9rem; font-weight: 600;
      padding: 8px 14px; border-radius: 10px;
      background: var(--toggle-bg); border: 1px solid var(--border);
      cursor: pointer; transition: 0.2s; margin-bottom: 24px;
    }
    .back-btn:hover { color: var(--blue); background: rgba(59,130,246,0.1); }
    .back-btn svg { width: 16px; height: 16px; }

    /* Header Artikel */
    .article-header { margin-bottom: 24px; }
    .article-title {
      margin: 0 0 14px; font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 900; color: var(--heading); line-height: 1.25;
    }
    .article-meta {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      color: var(--text-soft); font-size: 0.88rem;
    }
    .article-meta-item { display: flex; align-items: center; gap: 5px; }
    .article-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Gambar */
    .article-img-wrap {
      border-radius: 16px; overflow: hidden; margin-bottom: 12px;
      background: var(--caption-bg);
      border: 1px solid var(--border);
    }
    .article-img-wrap img {
      width: 100%; display: block;
      max-height: 480px; object-fit: cover;
      pointer-events: none; -webkit-user-drag: none;
    }
    .article-caption {
      padding: 10px 14px; font-size: 0.83rem;
      color: var(--text-soft); background: var(--caption-bg);
      border-top: 1px solid var(--border);
      font-style: italic; line-height: 1.5;
    }

    /* Divider */
    .article-divider {
      border: none; height: 1px;
      background: var(--border); margin: 24px 0;
    }

    /* Konten Artikel (Rich Text) */
    .article-body {
      font-size: 1.05rem; line-height: 1.85; color: var(--text);
    }
    .article-body h1, .article-body h2, .article-body h3 {
      color: var(--heading); font-weight: 800; margin: 1.6em 0 0.5em; line-height: 1.3;
    }
    .article-body h1 { font-size: 1.6rem; }
    .article-body h2 { font-size: 1.35rem; }
    .article-body h3 { font-size: 1.15rem; }
    .article-body p { margin: 0 0 1.2em; }
    .article-body ul, .article-body ol { margin: 0 0 1.2em; padding-left: 1.6em; }
    .article-body li { margin-bottom: 0.4em; }
    .article-body strong { color: var(--heading); font-weight: 700; }
    .article-body em { font-style: italic; }
    .article-body blockquote {
      border-left: 4px solid var(--blockquote-border);
      padding: 12px 18px; margin: 1.2em 0;
      background: var(--code-bg); border-radius: 0 10px 10px 0;
      color: var(--text-soft);
    }
    .article-body code {
      background: var(--code-bg); padding: 2px 7px; border-radius: 5px;
      font-family: monospace; font-size: 0.9em;
    }
    .article-body a { color: var(--blue); text-decoration: underline; }

    /* ── SHARE PANEL ── */
    .share-wrap {
      margin: 32px 0;
      padding: 20px;
      background: var(--caption-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .share-title {
      margin: 0 0 14px;
      font-size: 0.92rem; font-weight: 700; color: var(--text-soft);
      display: flex; align-items: center; gap: 7px;
    }
    .share-title svg { width: 15px; height: 15px; }
    .share-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .share-item {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 12px 8px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 0.75rem; font-weight: 700; color: #fff;
      transition: transform 0.2s, opacity 0.2s; text-decoration: none;
      background: transparent;
    }
    .share-item:hover { transform: translateY(-3px); opacity: 0.88; }
    .share-item .si-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .share-item span { font-size: 0.72rem; color: var(--text-soft); font-weight: 600; }
    .si-wa   .si-icon { background: #25d366; }
    .si-fb   .si-icon { background: #1877f2; }
    .si-x    .si-icon { background: #000; border: 1px solid rgba(255,255,255,0.15); }
    .si-ig   .si-icon { background: linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7); }
    .si-tg   .si-icon { background: #229ed9; }
    .si-tt   .si-icon { background: #010101; border: 1px solid rgba(255,255,255,0.15); }
    .si-li   .si-icon { background: #0a66c2; }
    .si-copy .si-icon { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .si-copy.copied .si-icon { background: linear-gradient(135deg, #10b981, #059669); }
    @media (max-width: 480px) { .share-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; } }

    /* ── ARTIKEL TERKAIT ── */
    .related-section {
      max-width: var(--read-maxw); margin: 0 auto 60px; padding: 0 20px;
    }
    .related-title {
      font-size: 1.15rem; font-weight: 800; color: var(--heading);
      margin: 0 0 16px; padding-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }
    .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

    .related-item {
      background: var(--related-bg);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform .2s, border-color .2s;
    }
    .related-item:hover { transform: translateY(-4px); border-color: rgba(59,130,246,0.3); }
    .related-item a { display: block; text-decoration: none; color: inherit; }
    .related-item img {
      width: 100%; height: 120px; object-fit: cover; display: block;
      pointer-events: none; -webkit-user-drag: none;
    }
    .related-item-body { padding: 10px 12px 12px; }
    .related-item-title {
      font-size: 0.88rem; font-weight: 700; color: var(--heading);
      margin: 0 0 6px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .related-item-date { font-size: 0.75rem; color: var(--text-soft); }

    footer { text-align: center; padding: 20px 20px 40px; color: var(--text-soft); font-size: 0.9rem; }

    /* ── BACK TO TOP ── */
    #backToTop {
      position: fixed; bottom: 28px; right: 24px; z-index: 200;
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #backToTop.visible { opacity: 1; pointer-events: auto; }
    #backToTop:hover { transform: translateY(-3px); }

    @media (max-width: 640px) {
      .nav-wrap { flex-direction: column; align-items: center; }
      .nav-right { width: 100%; justify-content: center; }
      .related-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

          <button class="share-item si-li" onclick="shareLI()" title="LinkedIn">
            <div class="si-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </div>
            <span>LinkedIn</span>
          </button>

          <button class="share-item si-copy" id="copyBtn" onclick="copyLink()" title="Salin Link">
            <div class="si-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </div>
            <span id="copyLabel">Salin Link</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Artikel Terkait -->
    <div class="related-section">
      <h2 class="related-title">Artikel Lainnya</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </div>

  <footer id="pageFooter"></footer>

  <button id="backToTop" aria-label="Kembali ke atas">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.getElementById('pageFooter').textContent = `© ${new Date().getFullYear()} Muhammad Nurokhim`;

    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── TEMA TOGGLE ──
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    themeToggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
    });

    // ── UTILS ──
    function formatTanggal(iso) {
      return new Date(iso).toLocaleDateString('id-ID', {
        day: '2-digit', month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function escapeHtml(str = '') {
      return str.replaceAll('&','&amp;').replaceAll('<','&lt;')
                .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    }

    // ── LOAD ARTIKEL ──
    const params = new URLSearchParams(location.search);
    const articleId = params.get('id');

    if (!articleId) { window.location.href = 'artikel.html'; }

    async function loadArtikel() {
      const { data, error } = await client
        .from('articles')
        .select('*')
        .eq('id', articleId)
        .single();

      document.getElementById('loadingState').style.display = 'none';

      if (error || !data) {
        document.body.innerHTML += `<div style="text-align:center;padding:60px 20px;color:#94a3b8;">Artikel tidak ditemukan. <a href="artikel.html" style="color:#3b82f6;">Kembali</a></div>`;
        return;
      }

      // Isi konten
      document.title = data.title + ' — Muhammad Nurokhim';
      document.getElementById('artTitle').textContent = data.title;
      document.getElementById('artDate').textContent = formatTanggal(data.created_at);

      // Gambar
      if (data.image_name) {
        const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/articles/${data.image_name}`;
        document.getElementById('artImg').src = imgUrl;
        document.getElementById('artImg').alt = data.title;
      } else {
        document.getElementById('artImgWrap').style.display = 'none';
      }

      // Keterangan gambar
      if (data.caption && data.caption.trim()) {
        const cap = document.getElementById('artCaption');
        cap.textContent = data.caption;
        cap.style.display = 'block';
      }

      // Body / konten (rich text HTML dari editor)
      document.getElementById('artBody').innerHTML = data.content || '';

      document.getElementById('articleWrap').style.display = 'block';

      loadRelated(articleId);
    }

    async function loadRelated(currentId) {
      const { data } = await client
        .from('articles')
        .select('id, title, image_name, created_at')
        .neq('id', currentId)
        .order('created_at', { ascending: false })
        .limit(4);

      const grid = document.getElementById('relatedGrid');
      if (!data || !data.length) {
        grid.parentElement.style.display = 'none';
        return;
      }

      data.forEach(item => {
        const imgUrl = item.image_name
          ? `${SUPABASE_URL}/storage/v1/object/public/articles/${item.image_name}`
          : 'https://placehold.co/400x225/1e293b/94a3b8?text=No+Image';

        const el = document.createElement('div');
        el.className = 'related-item';
        el.innerHTML = `
          <a href="baca-artikel.html?id=${item.id}">
            <img src="${imgUrl}" alt="${escapeHtml(item.title)}" loading="lazy" draggable="false">
            <div class="related-item-body">
              <div class="related-item-title">${escapeHtml(item.title)}</div>
              <div class="related-item-date">${formatTanggal(item.created_at)}</div>
            </div>
          </a>
        `;
        grid.appendChild(el);
      });
    }

    // ── SHARE SOSMED ──
    function getShareUrl() { return encodeURIComponent(location.href); }
    function getShareTitle() { return encodeURIComponent(document.getElementById('artTitle').textContent || document.title); }

    function shareWA()  { window.open(`https://wa.me/?text=${getShareTitle()}%20${getShareUrl()}`, '_blank'); }
    function shareFB()  { window.open(`https://www.facebook.com/sharer/sharer.php?u=${getShareUrl()}`, '_blank'); }
    function shareX()   { window.open(`https://twitter.com/intent/tweet?text=${getShareTitle()}&url=${getShareUrl()}`, '_blank'); }
    function shareIG()  {
      copyLink();
      setTimeout(() => alert('Link sudah disalin! Tempel di bio atau Story Instagram kamu.'), 300);
    }
    function shareTG()  { window.open(`https://t.me/share/url?url=${getShareUrl()}&text=${getShareTitle()}`, '_blank'); }
    function shareTT()  {
      copyLink();
      setTimeout(() => alert('Link sudah disalin! Tempel di deskripsi video TikTok kamu.'), 300);
    }
    function shareLI()  { window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${getShareUrl()}`, '_blank'); }

    async function copyLink() {
      const btn = document.getElementById('copyBtn');
      const lbl = document.getElementById('copyLabel');
      try {
        await navigator.clipboard.writeText(location.href);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = location.href;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      btn.classList.add('copied');
      lbl.textContent = '✅ Disalin!';
      setTimeout(() => { btn.classList.remove('copied'); lbl.textContent = 'Salin Link'; }, 2500);
    }

    // ── BLOKIR COPY ──
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });

    // ── BACK TO TOP ──
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => backToTop.classList.toggle('visible', window.scrollY > 300));
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    loadArtikel();
  </script>
</body>
</html>

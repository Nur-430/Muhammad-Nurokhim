<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Galeri - Nurokhim</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg-soft:#111827;
      --card:#182235;
      --card-2:#1e2a44;
      --text:#e5eefc;
      --muted:#94a3b8;
      --accent:#3b82f6;
      --accent-2:#60a5fa;
      --danger:#ef4444;
      --border:rgba(148,163,184,0.15);
      --shadow:0 10px 30px rgba(0,0,0,0.35);
      --maxw:1200px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(96,165,250,0.10), transparent 35%),
        linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      min-height:100vh;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 22px;
      border-bottom:1px solid var(--border);
      background:rgba(11,18,32,0.85);
      backdrop-filter:blur(12px);
      position:sticky;
      top:0;
      z-index:50;
    }

    nav .brand{
      font-weight:800;
      color:#fff;
      font-size:20px;
    }

    nav .links a{
      color:var(--muted);
      text-decoration:none;
      font-weight:700;
      margin-left:16px;
    }

    nav .links a:hover{
      color:var(--accent-2);
    }

    .container{
      max-width:var(--maxw);
      margin:30px auto;
      padding:0 20px;
    }

    .grid{
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:24px;
    }

    .card{
      background:rgba(24,34,53,0.8);
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    h1,h2,h3{
      margin-top:0;
      color:#fff;
    }

    .muted{
      color:var(--muted);
    }

    .form-group{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:700;
      color:#dbeafe;
    }

    input[type="text"],
    textarea,
    input[type="file"]{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,0.18);
      background:#0f172a;
      color:#fff;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
      transition:.2s;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#fff;
      box-shadow:0 10px 24px rgba(59,130,246,0.25);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
    }

    .btn-danger{
      background:rgba(239,68,68,0.14);
      color:#fecaca;
      border:1px solid rgba(239,68,68,0.25);
    }

    .status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(59,130,246,0.08);
      color:#cfe3ff;
      border:1px solid rgba(59,130,246,0.15);
      display:none;
      white-space:pre-wrap;
    }

    .gallery-list{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
      gap:16px;
      margin-top:16px;
    }

    .item{
      background:rgba(30,42,68,0.75);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .thumb{
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    .item-body{
      padding:14px;
    }

    .item-title{
      font-weight:800;
      margin-bottom:8px;
      color:#fff;
    }

    .item-desc{
      color:var(--muted);
      font-size:14px;
      margin-bottom:10px;
      min-height:36px;
    }

    .item-date{
      color:#93c5fd;
      font-size:13px;
      margin-bottom:12px;
    }

    .preview-box{
      margin-top:14px;
      border:1px dashed rgba(148,163,184,0.25);
      border-radius:16px;
      padding:14px;
      text-align:center;
    }

    .preview-box img{
      max-width:100%;
      max-height:220px;
      border-radius:14px;
      object-fit:cover;
      display:none;
      margin:auto;
    }

    @media (max-width:900px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="brand">Admin Galeri</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="galeri.html">Galeri</a>
    </div>
  </nav>

  <div class="container">
    <div class="grid">
      <!-- FORM UPLOAD -->
      <div class="card">
        <h2>Upload Gambar</h2>
        <p class="muted">Upload gambar ke bucket <strong>uploads</strong> lalu simpan metadata ke tabel <strong>gallery</strong>.</p>

        <form id="uploadForm">
          <div class="form-group">
            <label for="title">Judul Gambar</label>
            <input type="text" id="title" placeholder="Contoh: Senja di Pantai" required />
          </div>

          <div class="form-group">
            <label for="description">Deskripsi (Opsional)</label>
            <textarea id="description" placeholder="Tambahkan deskripsi gambar..."></textarea>
          </div>

          <div class="form-group">
            <label for="imageFile">Pilih Gambar</label>
            <input type="file" id="imageFile" accept="image/*" required />
          </div>

          <div class="preview-box">
            <p class="muted">Preview gambar</p>
            <img id="previewImage" alt="Preview">
          </div>

          <button type="submit" class="btn btn-primary" id="uploadBtn">Upload Sekarang</button>
          <div class="status" id="statusBox"></div>
        </form>
      </div>

      <!-- MANAJEMEN -->
      <div class="card">
        <h2>Manajemen Galeri</h2>
        <p class="muted">Daftar gambar yang sudah tersimpan. Bisa dihapus dari tabel dan storage.</p>

        <button class="btn btn-primary" onclick="loadGallery()">Refresh Data</button>

        <div class="gallery-list" id="galleryList"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const uploadForm = document.getElementById('uploadForm');
    const titleInput = document.getElementById('title');
    const descriptionInput = document.getElementById('description');
    const imageFileInput = document.getElementById('imageFile');
    const previewImage = document.getElementById('previewImage');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusBox = document.getElementById('statusBox');
    const galleryList = document.getElementById('galleryList');

    function showStatus(message, isError = false) {
      statusBox.style.display = 'block';
      statusBox.textContent = message;
      statusBox.style.background = isError
        ? 'rgba(239,68,68,0.12)'
        : 'rgba(59,130,246,0.08)';
      statusBox.style.color = isError ? '#fecaca' : '#cfe3ff';
      statusBox.style.border = isError
        ? '1px solid rgba(239,68,68,0.2)'
        : '1px solid rgba(59,130,246,0.15)';
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('id-ID', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
    }

    imageFileInput.addEventListener('change', () => {
      const file = imageFileInput.files[0];
      if (!file) {
        previewImage.style.display = 'none';
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewImage.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function uploadImage(file, fileName) {
      const { error } = await client.storage
        .from('uploads')
        .upload(fileName, file, {
          cacheControl: '3600',
          upsert: false
        });

      if (error) throw error;

      const { data } = client.storage.from('uploads').getPublicUrl(fileName);
      return data.publicUrl;
    }

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = titleInput.value.trim();
      const description = descriptionInput.value.trim();
      const file = imageFileInput.files[0];

      if (!title || !file) {
        showStatus('Judul dan file gambar wajib diisi.', true);
        return;
      }

      try {
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Mengupload...';
        showStatus('Sedang upload gambar dan menyimpan data...');

        const ext = file.name.split('.').pop().toLowerCase();
        const safeTitle = title
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');

        const fileName = `${Date.now()}-${safeTitle}.${ext}`;

        // 1. Upload ke storage
        const publicUrl = await uploadImage(file, fileName);

        // 2. Simpan metadata ke tabel
        const { error: insertError } = await client
          .from('gallery')
          .insert([
            {
              title,
              description: description || null,
              image_path: fileName,
              image_url: publicUrl
            }
          ]);

        if (insertError) {
          // rollback hapus file kalau insert gagal
          await client.storage.from('uploads').remove([fileName]);
          throw insertError;
        }

        showStatus('Upload berhasil! Gambar masuk ke galeri.');
        uploadForm.reset();
        previewImage.style.display = 'none';
        await loadGallery();

      } catch (error) {
        console.error(error);
        showStatus('Upload gagal:\n' + error.message, true);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload Sekarang';
      }
    });

    async function deleteItem(id, imagePath, title) {
      const confirmDelete = confirm(`Hapus gambar "${title}"?`);
      if (!confirmDelete) return;

      try {
        // 1. Hapus file dari storage
        const { error: storageError } = await client
          .storage
          .from('uploads')
          .remove([imagePath]);

        if (storageError) throw storageError;

        // 2. Hapus metadata dari tabel
        const { error: dbError } = await client
          .from('gallery')
          .delete()
          .eq('id', id);

        if (dbError) throw dbError;

        showStatus(`Gambar "${title}" berhasil dihapus.`);
        await loadGallery();
      } catch (error) {
        console.error(error);
        showStatus('Gagal menghapus gambar:\n' + error.message, true);
      }
    }

    async function loadGallery() {
      galleryList.innerHTML = '<p class="muted">Memuat data...</p>';

      const { data, error } = await client
        .from('gallery')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        galleryList.innerHTML = '<p class="muted">Gagal memuat data galeri.</p>';
        return;
      }

      if (!data || data.length === 0) {
        galleryList.innerHTML = '<p class="muted">Belum ada gambar di galeri.</p>';
        return;
      }

      galleryList.innerHTML = '';

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
          <img src="${item.image_url}" alt="${item.title}" class="thumb" oncontextmenu="return false;" draggable="false">
          <div class="item-body">
            <div class="item-title">${escapeHtml(item.title)}</div>
            <div class="item-desc">${escapeHtml(item.description || 'Tanpa deskripsi')}</div>
            <div class="item-date">Upload: ${formatDate(item.created_at)}</div>
            <button class="btn btn-danger">Hapus</button>
          </div>
        `;

        div.querySelector('button').addEventListener('click', () => {
          deleteItem(item.id, item.image_path, item.title);
        });

        galleryList.appendChild(div);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.addEventListener('contextmenu', (e) => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    document.addEventListener('dragstart', (e) => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    loadGallery();
  </script>
</body>
</html>

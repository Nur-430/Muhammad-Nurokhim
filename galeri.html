<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri — Muhammad Nurokhim</title>
  <meta name="description" content="Galeri foto dan karya visual Muhammad Nurokhim — koleksi gambar digital dan dokumentasi karya pribadi." />
  <meta property="og:title" content="Galeri — Muhammad Nurokhim" />
  <meta property="og:description" content="Galeri foto dan karya visual Muhammad Nurokhim." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --radius: 18px;
      --maxw: 1200px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent 25%),
        radial-gradient(circle at bottom left, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(180deg, #0b1220, #0f172a);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: rgba(15, 23, 42, 0.82);
      border-bottom: 1px solid rgba(59, 130, 246, 0.12);
    }

    .nav-wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 800;
      color: #93c5fd;
      letter-spacing: 0.3px;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 7px 13px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #bfdbfe;
      background: rgba(59,130,246,0.12);
    }

    /* ── LAYOUT ── */
    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 30px 20px 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 26px;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: #fff;
    }

    /* ── SKELETON LOADING ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .skeleton-card {
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
    }

    .skeleton-img {
      width: 100%;
      height: 240px;
      background: linear-gradient(90deg, #1e293b 25%, #263347 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-text {
      padding: 12px;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, #1e293b 25%, #263347 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 8px;
    }

    .skeleton-line.short { width: 55%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── GALLERY ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(59,130,246,0.35);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .card-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 12px;
      background: linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,.15), transparent);
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date { margin-top: 4px; font-size: 12px; color: #cbd5e1; }

    .empty, .error {
      text-align: center;
      padding: 28px;
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
    }

    .error { color: #fca5a5; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.95);
      z-index: 999;
      padding: 16px;
    }

    .lightbox.visible { display: flex; }

    .lb-content {
      width: min(98vw, 1500px);
      max-height: 96vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .lb-image-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 58vh;
      max-height: 76vh;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 8px;
    }

    .lb-image {
      max-width: 100%;
      max-height: 74vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lb-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .lb-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      background: rgba(59,130,246,0.16);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      min-width: 110px;
      transition: background 0.2s;
    }

    .lb-btn:hover { background: rgba(59,130,246,0.28); }

    .lb-info {
      width: min(900px, 100%);
      margin-top: 16px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .lb-title {
      margin: 0 0 8px;
      font-size: clamp(20px, 2vw, 26px);
      font-weight: 800;
      color: #fff;
    }

    .lb-desc { margin: 0; color: #cbd5e1; line-height: 1.6; white-space: pre-wrap; }

    .lb-date { margin-top: 10px; font-size: 13px; color: var(--muted); }

    .lb-close {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.18);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      z-index: 3;
      transition: background 0.2s;
    }

    .lb-close:hover { background: rgba(239,68,68,0.32); }

    /* ── BACK TO TOP ── */
    #backToTop {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 200;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(37,99,235,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #backToTop.visible { opacity: 1; pointer-events: auto; }
    #backToTop:hover { transform: translateY(-3px); }

    footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .nav-wrap { flex-direction: column; align-items: center; }
      .nav-links { gap: 2px; justify-content: center; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-wrap">
      <a href="index.html" class="brand">Muhammad Nurokhim</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="artikel.html">Artikel</a>
        <a href="galeri.html" class="active">Galeri</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Galeri</h1>
    </header>

    <!-- Skeleton loader -->
    <div id="skeletonLoader" class="skeleton-grid">
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
    </div>

    <section class="gallery" id="gallery" style="display:none;"></section>
    <div id="statusBox"></div>
  </main>

  <footer id="pageFooter"></footer>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog">
    <div class="lb-content">
      <button class="lb-close" id="lbClose" aria-label="Tutup">✕</button>

      <div class="lb-image-wrap">
        <img id="lbImage" class="lb-image" src="" alt="" draggable="false" />
      </div>

      <div class="lb-controls">
        <button class="lb-btn" id="prevBtn">⟵ Previous</button>
        <button class="lb-btn" id="nextBtn">Next ⟶</button>
      </div>

      <div class="lb-info">
        <h2 class="lb-title" id="lbTitle"></h2>
        <p class="lb-desc" id="lbDesc"></p>
        <div class="lb-date" id="lbDate"></div>
      </div>
    </div>
  </div>

  <!-- BACK TO TOP -->
  <button id="backToTop" aria-label="Kembali ke atas" title="Kembali ke atas">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Tahun footer otomatis (Fix #4) ──
    document.getElementById('pageFooter').textContent = `© ${new Date().getFullYear()} Muhammad Nurokhim`;

    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const gallery       = document.getElementById("gallery");
    const statusBox     = document.getElementById("statusBox");
    const skeletonLoader = document.getElementById("skeletonLoader");

    const lightbox = document.getElementById("lightbox");
    const lbImage  = document.getElementById("lbImage");
    const lbTitle  = document.getElementById("lbTitle");
    const lbDesc   = document.getElementById("lbDesc");
    const lbDate   = document.getElementById("lbDate");
    const lbClose  = document.getElementById("lbClose");
    const prevBtn  = document.getElementById("prevBtn");
    const nextBtn  = document.getElementById("nextBtn");

    let images = [];
    let currentIndex = 0;

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("id-ID", {
        day: "2-digit", month: "long", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadGallery() {
      statusBox.innerHTML = "";
      gallery.innerHTML = "";

      // ── Bug Fix #3: skeleton sudah tampil sejak halaman load ──

      const { data, error } = await client
        .from("gallery_images")
        .select("*")
        .order("uploaded_at", { ascending: false });

      // Sembunyikan skeleton setelah data tiba
      skeletonLoader.style.display = "none";

      if (error) {
        statusBox.innerHTML = `<div class="error">Gagal memuat galeri: ${escapeHtml(error.message)}</div>`;
        return;
      }

      images = data || [];

      if (!images.length) {
        statusBox.innerHTML = `<div class="empty">Belum ada gambar di galeri.</div>`;
        return;
      }

      gallery.style.display = "grid";

      images.forEach((item, index) => {
        const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/uploads/${item.file_name}`;

        const card = document.createElement("div");
        card.className = "card";
        card.tabIndex = 0;
        card.innerHTML = `
          <img src="${imageUrl}" alt="${escapeHtml(item.title)}" loading="lazy" draggable="false">
          <div class="card-overlay">
            <p class="card-title">${escapeHtml(item.title)}</p>
            <div class="card-date">${formatDate(item.uploaded_at)}</div>
          </div>
        `;

        card.addEventListener("click", () => openLightbox(index));
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openLightbox(index); }
        });

        gallery.appendChild(card);
      });
    }

    function openLightbox(index) {
      currentIndex = index;
      renderLightbox();
      lightbox.classList.add("visible");
      document.body.style.overflow = "hidden";
      lbClose.focus();
    }

    function renderLightbox() {
      const item = images[currentIndex];
      if (!item) return;
      const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/uploads/${item.file_name}`;
      lbImage.src = imageUrl;
      lbImage.alt = item.title || "Gambar";
      lbTitle.textContent = item.title || "Tanpa Judul";
      lbDesc.textContent = item.description?.trim() ? item.description : "Tidak ada deskripsi.";
      lbDate.textContent = "Tanggal upload: " + formatDate(item.uploaded_at);
    }

    function closeLightbox() {
      lightbox.classList.remove("visible");
      document.body.style.overflow = "";
      lbImage.src = "";
    }

    function nextImage() {
      if (!images.length) return;
      currentIndex = (currentIndex + 1) % images.length;
      renderLightbox();
    }

    function prevImage() {
      if (!images.length) return;
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      renderLightbox();
    }

    lbClose.addEventListener("click", closeLightbox);
    nextBtn.addEventListener("click", nextImage);
    prevBtn.addEventListener("click", prevImage);

    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("visible")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
    });

    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener("dragstart", (e) => { if (e.target.tagName === "IMG") e.preventDefault(); });

    // ── Back to Top ──
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('visible', window.scrollY > 300);
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadGallery();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Galeri - Nurokhim</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --card2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #2563eb;
      --red: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --radius: 18px;
      --maxw: 1200px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent 25%),
        radial-gradient(circle at bottom left, rgba(37,99,235,0.12), transparent 30%),
        linear-gradient(180deg, #0b1220, #0f172a);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(11, 18, 32, 0.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    nav a, nav button {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 12px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    nav a:hover, nav button:hover,
    nav a.active {
      color: #fff;
      background: rgba(59,130,246,0.14);
    }

    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
    }

    .admin-email {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 24px;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      color: #dbeafe;
    }

    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      color: #fff;
      outline: none;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
    }

    .btn-danger {
      background: rgba(239,68,68,0.18);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .gallery-list {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .item {
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .item-body {
      padding: 14px;
    }

    .item-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .item-date {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .item-desc {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .item-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .edit-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .edit-box.active {
      display: block;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="galeri.html">Galeri</a>
    <a href="admin.html" class="active">Admin</a>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="container" id="app" style="display:none;">
    <h1>Admin Galeri</h1>
    <div class="admin-email" id="adminEmail"></div>

    <section class="panel">
      <h2>Upload Gambar</h2>
      <div class="grid">
        <div class="field">
          <label for="imageFile">Pilih Gambar</label>
          <input type="file" id="imageFile" accept="image/*" />
        </div>

        <div class="field">
          <label for="imageTitle">Judul</label>
          <input type="text" id="imageTitle" placeholder="Masukkan judul gambar" />
        </div>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="imageDesc">Deskripsi (opsional)</label>
        <textarea id="imageDesc" placeholder="Masukkan deskripsi gambar"></textarea>
      </div>

      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="uploadBtn">Upload Gambar</button>
      </div>

      <div class="status" id="uploadStatus"></div>
    </section>

    <section class="panel">
      <h2>Manajemen Gambar</h2>
      <div class="gallery-list" id="adminGallery"></div>
      <div class="status" id="manageStatus"></div>
    </section>
  </main>

  <div class="loading" id="loading">Memeriksa akses admin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wcwbyqrxocjgykwonmoo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd2J5cXJ4b2NqZ3lrd29ubW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTIwNjAsImV4cCI6MjA4NjY2ODA2MH0.Pthqfu4N393tb0Mv6uuRUeHWevCU03gOHF1vwsPgWSk";
    const ADMIN_EMAIL = "nurokhim430@gmail.com"; // contoh: adminkamu@gmail.com

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = document.getElementById("app");
    const loading = document.getElementById("loading");
    const adminEmail = document.getElementById("adminEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    const imageFile = document.getElementById("imageFile");
    const imageTitle = document.getElementById("imageTitle");
    const imageDesc = document.getElementById("imageDesc");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadStatus = document.getElementById("uploadStatus");
    const adminGallery = document.getElementById("adminGallery");
    const manageStatus = document.getElementById("manageStatus");

    let currentUser = null;

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("id-ID", {
        day: "2-digit",
        month: "long",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeFileName(file) {
      const ext = file.name.split(".").pop();
      const safeBase = (imageTitle.value || "gambar")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return `${Date.now()}-${safeBase}.${ext}`;
    }

    async function requireAdmin() {
      const { data, error } = await client.auth.getSession();

      if (error || !data.session) {
        window.location.href = "admin-login.html";
        return false;
      }

      const user = data.session.user;
      const email = user?.email || "";

      if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
        await client.auth.signOut();
        window.location.href = "admin-login.html";
        return false;
      }

      currentUser = user;
      adminEmail.textContent = "Login sebagai: " + email;
      loading.style.display = "none";
      app.style.display = "block";
      return true;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "admin-login.html";
    }

    async function uploadImage() {
      const file = imageFile.files[0];
      const title = imageTitle.value.trim();
      const desc = imageDesc.value.trim();

      if (!file) {
        uploadStatus.textContent = "Pilih file gambar dulu.";
        return;
      }

      if (!title) {
        uploadStatus.textContent = "Judul wajib diisi.";
        return;
      }

      uploadBtn.disabled = true;
      uploadStatus.textContent = "Sedang upload...";

      const fileName = makeFileName(file);

      const { error: storageError } = await client.storage
        .from("uploads")
        .upload(fileName, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (storageError) {
        uploadStatus.textContent = "Upload gagal: " + storageError.message;
        uploadBtn.disabled = false;
        return;
      }

      const { error: dbError } = await client
        .from("gallery_images")
        .insert([{
          file_name: fileName,
          title: title,
          description: desc || null
        }]);

      if (dbError) {
        uploadStatus.textContent = "Gagal simpan data: " + dbError.message;
        uploadBtn.disabled = false;
        return;
      }

      uploadStatus.textContent = "Upload berhasil!";
      imageFile.value = "";
      imageTitle.value = "";
      imageDesc.value = "";
      uploadBtn.disabled = false;

      loadAdminGallery();
    }

    async function loadAdminGallery() {
      adminGallery.innerHTML = "";
      manageStatus.textContent = "";

      const { data, error } = await client
        .from("gallery_images")
        .select("*")
        .order("uploaded_at", { ascending: false });

      if (error) {
        manageStatus.textContent = "Gagal memuat data: " + error.message;
        return;
      }

      if (!data || !data.length) {
        manageStatus.textContent = "Belum ada gambar.";
        return;
      }

      data.forEach(item => {
        const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/uploads/${item.file_name}`;

        const wrapper = document.createElement("div");
        wrapper.className = "item";

        wrapper.innerHTML = `
          <img src="${imageUrl}" alt="${escapeHtml(item.title)}" draggable="false">
          <div class="item-body">
            <h3 class="item-title">${escapeHtml(item.title)}</h3>
            <div class="item-date">${formatDate(item.uploaded_at)}</div>
            <div class="item-desc">${item.description ? escapeHtml(item.description) : "Tidak ada deskripsi."}</div>

            <div class="item-actions">
              <button class="btn btn-secondary" data-edit="${item.id}">Edit</button>
              <button class="btn btn-danger" data-delete="${item.id}" data-file="${item.file_name}">Hapus</button>
            </div>

            <div class="edit-box" id="edit-box-${item.id}">
              <div class="field" style="margin-top: 12px;">
                <label>Judul</label>
                <input type="text" id="edit-title-${item.id}" value="${escapeHtml(item.title)}">
              </div>

              <div class="field" style="margin-top: 12px;">
                <label>Deskripsi</label>
                <textarea id="edit-desc-${item.id}">${item.description ? escapeHtml(item.description) : ""}</textarea>
              </div>

              <div class="item-actions" style="margin-top: 12px;">
                <button class="btn btn-primary" data-save="${item.id}">Simpan</button>
                <button class="btn btn-secondary" data-cancel="${item.id}">Batal</button>
              </div>
            </div>
          </div>
        `;

        adminGallery.appendChild(wrapper);
      });

      bindAdminActions();
    }

    function bindAdminActions() {
      document.querySelectorAll("[data-edit]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.edit;
          document.getElementById(`edit-box-${id}`).classList.add("active");
        });
      });

      document.querySelectorAll("[data-cancel]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.cancel;
          document.getElementById(`edit-box-${id}`).classList.remove("active");
        });
      });

      document.querySelectorAll("[data-save]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.save;
          const title = document.getElementById(`edit-title-${id}`).value.trim();
          const desc = document.getElementById(`edit-desc-${id}`).value.trim();

          if (!title) {
            alert("Judul tidak boleh kosong.");
            return;
          }

          btn.disabled = true;

          const { error } = await client
            .from("gallery_images")
            .update({
              title: title,
              description: desc || null
            })
            .eq("id", id);

          btn.disabled = false;

          if (error) {
            alert("Gagal update: " + error.message);
            return;
          }

          alert("Data berhasil diperbarui.");
          loadAdminGallery();
        });
      });

      document.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.delete;
          const fileName = btn.dataset.file;

          const ok = confirm("Yakin ingin menghapus gambar ini?");
          if (!ok) return;

          btn.disabled = true;

          const { error: storageError } = await client.storage
            .from("uploads")
            .remove([fileName]);

          if (storageError) {
            alert("Gagal hapus file storage: " + storageError.message);
            btn.disabled = false;
            return;
          }

          const { error: dbError } = await client
            .from("gallery_images")
            .delete()
            .eq("id", id);

          if (dbError) {
            alert("Gagal hapus data database: " + dbError.message);
            btn.disabled = false;
            return;
          }

          loadAdminGallery();
        });
      });
    }

    logoutBtn.addEventListener("click", logout);
    uploadBtn.addEventListener("click", uploadImage);

    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener("dragstart", (e) => {
      if (e.target.tagName === "IMG") e.preventDefault();
    });

    (async function init() {
      const ok = await requireAdmin();
      if (ok) {
        loadAdminGallery();
      }
    })();
  </script>
</body>
</html>
